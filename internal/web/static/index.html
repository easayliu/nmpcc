<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>nmpcc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
            serif: ['Instrument Serif', 'Georgia', 'serif'],
          },
          colors: {
            surface: {
              0: 'var(--surface-0)',
              1: 'var(--surface-1)',
              2: 'var(--surface-2)',
              3: 'var(--surface-3)',
            },
            border: {
              DEFAULT: 'var(--border)',
              subtle: 'var(--border-subtle)',
            },
            fg: {
              DEFAULT: 'var(--fg)',
              muted: 'var(--fg-muted)',
              faint: 'var(--fg-faint)',
            },
            accent: {
              DEFAULT: 'var(--accent)',
              soft: 'var(--accent-soft)',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">

  <!-- Top Bar -->
  <header class="min-h-[48px] border-b border-border flex items-center justify-between px-4 shrink-0 bg-surface-0 safe-area-pt">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-lg bg-accent flex items-center justify-center text-[11px] font-bold text-white tracking-tight shadow-sm">N</div>
      <div class="flex items-baseline gap-1.5">
        <span class="text-[14px] font-semibold tracking-tight">nmpcc</span>
        <span class="text-[10px] text-fg-faint font-medium tracking-wide uppercase">proxy</span>
      </div>
    </div>
    <div class="flex items-center gap-2.5">
      <!-- Auto-refresh indicator -->
<button onclick="toggleTheme()" title="Toggle theme"
        class="w-7 h-7 rounded-lg border border-border-subtle flex items-center justify-center text-fg-faint hover:text-fg hover:border-border transition-colors">
        <svg id="themeIconSun" class="w-3.5 h-3.5 hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="themeIconMoon" class="w-3.5 h-3.5 hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg id="themeIconSystem" class="w-3.5 h-3.5 hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
      </button>
      <button onclick="loadAll()" title="Refresh"
        class="w-7 h-7 rounded-lg border border-border-subtle flex items-center justify-center text-fg-faint hover:text-fg hover:border-border transition-colors">
        <svg id="refreshIcon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4.93 9a9 9 0 0115.04-1.36L20 9M19.07 15a9 9 0 01-15.04 1.36L4 15"/>
        </svg>
      </button>
      <div id="connDot" class="w-2 h-2 rounded-full bg-fg-faint/40" title="Connection status"></div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="sidebar w-52 border-r border-border flex flex-col shrink-0 bg-surface-0">
      <nav class="flex-1 py-3 px-2.5 space-y-0.5">
        <button onclick="navigate('overview')" data-nav="overview"
          class="nav-item w-full text-left px-3 py-2 rounded-lg text-[12px] flex items-center gap-2.5 transition-colors font-medium">
          <svg class="w-4 h-4 shrink-0 opacity-60" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 12a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7z"/>
          </svg>
          Overview
        </button>
        <button onclick="navigate('accounts')" data-nav="accounts"
          class="nav-item w-full text-left px-3 py-2 rounded-lg text-[12px] flex items-center gap-2.5 transition-colors font-medium">
          <svg class="w-4 h-4 shrink-0 opacity-60" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Accounts
          <span id="accountsBadge" class="ml-auto text-[10px] bg-surface-2 text-fg-faint px-1.5 py-0.5 rounded-md font-semibold tabular-nums"></span>
        </button>
        <button onclick="navigate('logs')" data-nav="logs"
          class="nav-item w-full text-left px-3 py-2 rounded-lg text-[12px] flex items-center gap-2.5 transition-colors font-medium">
          <svg class="w-4 h-4 shrink-0 opacity-60" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
          </svg>
          Logs
        </button>
        <button onclick="navigate('settings')" data-nav="settings"
          class="nav-item w-full text-left px-3 py-2 rounded-lg text-[12px] flex items-center gap-2.5 transition-colors font-medium">
          <svg class="w-4 h-4 shrink-0 opacity-60" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Settings
        </button>
      </nav>
      <!-- Sidebar footer with uptime -->
      <div class="border-t border-border px-3 py-2.5">
        <div class="flex items-center justify-between">
          <p class="text-[10px] text-fg-faint tracking-wide uppercase">Claude CLI Proxy</p>
          <span id="sidebarUptime" class="text-[10px] text-fg-faint tabular-nums"></span>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main id="content" class="flex-1 overflow-y-auto bg-surface-0 relative">
      <div id="pullIndicator">
        <div class="pull-icon text-fg-faint">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
          </svg>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Tab Bar -->
  <nav id="mobileTabBar" class="fixed bottom-0 left-0 right-0 h-14 bg-surface-0 border-t border-border flex items-center justify-around z-30 safe-area-pb" style="display:none">
    <button onclick="navigate('overview')" data-nav="overview" class="mob-tab flex flex-col items-center gap-0.5 py-1.5 px-3 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 12a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7z"/></svg>
      <span class="text-[10px] font-medium">Overview</span>
    </button>
    <button onclick="navigate('accounts')" data-nav="accounts" class="mob-tab flex flex-col items-center gap-0.5 py-1.5 px-3 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <span class="text-[10px] font-medium">Accounts</span>
    </button>
    <button onclick="navigate('logs')" data-nav="logs" class="mob-tab flex flex-col items-center gap-0.5 py-1.5 px-3 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
      <span class="text-[10px] font-medium">Logs</span>
    </button>
    <button onclick="navigate('settings')" data-nav="settings" class="mob-tab flex flex-col items-center gap-0.5 py-1.5 px-3 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="text-[10px] font-medium">Settings</span>
    </button>
  </nav>

  <!-- Add Account Modal -->
  <div id="loginModal" class="fixed inset-0 bg-black/30 dark:bg-black/50 modal-backdrop flex items-center justify-center z-50 hidden"
       onclick="if(event.target===this)closeLoginModal()">
    <div class="bg-surface-0 border border-border rounded-2xl w-full max-w-md mx-4 shadow-xl">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-border">
        <h3 class="text-[13px] font-semibold">Add Account</h3>
        <button onclick="closeLoginModal()" class="text-fg-faint hover:text-fg transition-colors p-1 -mr-1 rounded-md hover:bg-surface-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="px-5 py-4 space-y-3">
        <div class="text-[12px] text-fg-muted leading-relaxed">Run the following command on the server to add an account:</div>
        <div class="bg-surface-1 border border-border-subtle rounded-lg p-3 font-mono text-[11px] text-fg select-all leading-relaxed">CLAUDE_CONFIG_DIR=/accounts/<span class="text-accent">NAME</span> claude auth login</div>
        <div class="text-[11px] text-fg-faint leading-relaxed">Replace <span class="font-mono text-accent">NAME</span> with the account name. The account will be auto-discovered after login.</div>
        <button onclick="closeLoginModal();loadAll()"
          class="w-full text-[12px] border border-border text-fg-muted hover:text-fg
                 py-2 rounded-lg transition-colors font-medium hover:bg-surface-1">
          Done
        </button>
      </div>
    </div>
  </div>

  <!-- Account Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-black/30 dark:bg-black/50 modal-backdrop flex items-end sm:items-center justify-center z-50 hidden"
       onclick="if(event.target===this)this.classList.add('hidden')">
    <div class="bg-surface-0 border border-border rounded-t-2xl sm:rounded-2xl w-full max-w-md sm:mx-4 shadow-xl max-h-[90vh] sm:max-h-[85vh] flex flex-col safe-area-pb">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-border shrink-0">
        <h3 id="detailTitle" class="text-[13px] font-semibold">Account</h3>
        <button onclick="document.getElementById('detailModal').classList.add('hidden')"
          class="text-fg-faint hover:text-fg transition-colors p-1 -mr-1 rounded-md hover:bg-surface-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="detailBody" class="px-5 py-4 text-[12px] space-y-2 overflow-y-auto"></div>
    </div>
  </div>

<script src="utils.js"></script>
<script src="components.js"></script>
<script src="pages.js"></script>
<script src="app.js"></script>
</body>
</html>
